<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙女下凡 · 美甲神諭</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Noto+Serif+TC:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBF7F2;--ivory:#F5EDE0;--blush:#F0DDD0;
  --rg:#C8956A;--rg-light:#E8B898;--rg-glow:rgba(200,149,106,.28);
  --dusty:#D48080;--gold:#C8A050;
  --dark:#3D2B20;--med:#7A6458;--muted:#A09088;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:hidden;}
body{background:var(--cream);color:var(--dark);font-family:'Noto Serif TC',serif;min-height:100vh;overflow-x:hidden;}

.bg-layer{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 65% 55% at 15% 80%,rgba(240,200,175,.22) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 82% 18%,rgba(205,185,225,.16) 0%,transparent 55%),
    radial-gradient(ellipse 80% 38% at 50% 105%,rgba(245,220,200,.28) 0%,transparent 50%),
    linear-gradient(165deg,#FDF9F5 0%,#F8F0E8 45%,#F4EAE0 100%);
}
#petalCanvas{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;}

.page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:52px 22px 80px;display:flex;flex-direction:column;align-items:center;gap:32px;}

/* HEADER */
.header{text-align:center;animation:fadeDown 1.4s cubic-bezier(.22,1,.36,1) both;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);}}
.header-script{display:block;font-family:'Pinyon Script',cursive;font-size:1.4rem;color:var(--rg);letter-spacing:.25em;margin-bottom:6px;opacity:.75;}
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.3rem,6vw,3.9rem);font-weight:300;font-style:italic;color:var(--dark);letter-spacing:.07em;line-height:1.1;}
.header h1 .dot{color:var(--rg);}
.header-sub{margin-top:9px;font-size:.73rem;color:var(--muted);letter-spacing:.42em;font-weight:300;}
.ornament{display:flex;align-items:center;gap:14px;margin:14px auto 0;max-width:300px;color:var(--rg-light);font-size:.8rem;}
.ornament::before,.ornament::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--rg-light),transparent);}

/* INSTRUCTION */
.instr{text-align:center;font-size:.86rem;color:var(--med);letter-spacing:.2em;line-height:1.95;font-weight:300;animation:fadeDown 1.2s ease .4s both;}
.instr em{color:var(--rg);font-style:italic;}

/* CARD */
.card-stage{display:flex;flex-direction:column;align-items:center;gap:22px;animation:fadeDown 1.2s ease .6s both;}
.card-wrap{width:195px;aspect-ratio:2/3.45;perspective:1200px;cursor:pointer;touch-action:manipulation;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 1s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;overflow:hidden;}

/* BACK */
.card-back{
  background:linear-gradient(155deg,#FCF6EE 0%,#F6E9D9 60%,#F1E0CA 100%);
  border:1.5px solid rgba(200,149,106,.32);
  box-shadow:0 0 0 1px rgba(200,149,106,.09),inset 0 0 28px rgba(200,149,106,.07),0 18px 55px rgba(60,40,20,.14),0 6px 18px rgba(60,40,20,.09);
  display:flex;align-items:center;justify-content:center;
  transition:box-shadow .3s,transform .3s;
}
.card-back:hover{
  box-shadow:0 0 0 1.5px rgba(200,149,106,.48),inset 0 0 38px rgba(200,149,106,.12),0 22px 65px rgba(60,40,20,.18),0 8px 28px rgba(60,40,20,.11);
  transform:translateY(-5px) scale(1.01);
}
.back-inner{width:84%;height:90%;border:1px solid rgba(200,149,106,.22);border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 10px;position:relative;overflow:hidden;}
.back-inner::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,149,106,.07) 1px,transparent 1px);background-size:13px 13px;}
.back-corner{position:absolute;font-size:.5rem;color:rgba(200,149,106,.38);font-family:'Cormorant Garamond',serif;letter-spacing:.05em;}
.back-corner.tl{top:7px;left:9px;}.back-corner.br{bottom:7px;right:9px;}
.back-emoji{font-size:3rem;line-height:1;filter:drop-shadow(0 2px 8px rgba(200,149,106,.28));animation:floatCard 5s ease-in-out infinite;z-index:1;}
@keyframes floatCard{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.back-label{font-family:'Cormorant Garamond',serif;font-size:.68rem;font-style:italic;color:var(--rg);letter-spacing:.18em;z-index:1;}
.back-petals{font-size:1rem;opacity:.35;letter-spacing:.18em;z-index:1;}

/* FRONT */
.card-front{
  transform:rotateY(180deg);
  border:1.5px solid rgba(200,149,106,.38);
  box-shadow:0 0 0 1px rgba(200,149,106,.1),inset 0 0 38px rgba(200,149,106,.09),0 18px 55px rgba(60,40,20,.18);
  display:flex;align-items:stretch;
}
.card-inner.flipped .card-front{animation:frontGlow 4s ease-in-out 1s infinite;}
@keyframes frontGlow{
  0%,100%{box-shadow:0 0 0 1px rgba(200,149,106,.1),inset 0 0 38px rgba(200,149,106,.09),0 18px 55px rgba(60,40,20,.18);}
  50%{box-shadow:0 0 0 1.5px rgba(200,149,106,.4),inset 0 0 50px rgba(200,149,106,.16),0 0 28px rgba(200,149,106,.14),0 22px 60px rgba(60,40,20,.24);}
}
.front-frame{flex:1;margin:9px;border:1px solid rgba(200,149,106,.2);border-radius:11px;display:flex;flex-direction:column;align-items:center;padding:9px 6px;gap:5px;position:relative;}
.front-frame::before{content:'✦';position:absolute;top:6px;left:7px;color:rgba(200,149,106,.32);font-size:6.5px;}
.front-frame::after{content:'✦';position:absolute;bottom:6px;right:7px;color:rgba(200,149,106,.32);font-size:6.5px;}
.card-roman{font-family:'Cormorant Garamond',serif;font-size:.48rem;font-style:italic;color:var(--muted);letter-spacing:.12em;}
.card-art{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;}
.card-emoji-main{font-size:clamp(2.4rem,6vw,3.6rem);line-height:1;filter:drop-shadow(0 2px 8px rgba(200,149,106,.32));animation:floatEmoji 4.5s ease-in-out 1s infinite;}
@keyframes floatEmoji{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-4px) scale(1.02);}}
.card-emoji-sub{font-size:clamp(.85rem,2vw,1.15rem);line-height:1;opacity:.6;letter-spacing:.08em;}
.card-divider{width:50%;height:1px;background:linear-gradient(to right,transparent,rgba(200,149,106,.38),transparent);flex-shrink:0;}
.card-name-text{font-family:'Cormorant Garamond',serif;font-size:clamp(.6rem,1.4vw,.78rem);font-weight:600;color:var(--dark);text-align:center;letter-spacing:.06em;line-height:1.3;}
.card-energy-text{font-size:clamp(.4rem,.95vw,.52rem);color:var(--rg);text-align:center;letter-spacing:.05em;line-height:1.4;padding:0 2px;}

/* SHIMMER */
.shimmer-wrap{position:absolute;inset:0;border-radius:16px;overflow:hidden;pointer-events:none;display:none;}
.shimmer-wrap::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,242,228,.42),transparent);animation:shimmerSlide 1.8s ease forwards;}
@keyframes shimmerSlide{0%{left:-100%;}100%{left:200%;}}

/* DRAW BTN */
.draw-btn{padding:13px 48px;background:linear-gradient(135deg,rgba(200,149,106,.13),rgba(240,200,178,.18));border:1px solid var(--rg);color:var(--dark);font-family:'Noto Serif TC',serif;font-size:.86rem;letter-spacing:.35em;cursor:pointer;border-radius:2px;position:relative;overflow:hidden;transition:all .35s ease;touch-action:manipulation;}
.draw-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,149,106,.18),rgba(240,200,178,.26));opacity:0;transition:opacity .3s;}
.draw-btn:hover::before{opacity:1;}
.draw-btn:hover{box-shadow:0 0 22px var(--rg-glow),0 5px 18px rgba(60,40,20,.1);transform:translateY(-2px);letter-spacing:.4em;}

/* RESULT */
.result-area{width:100%;max-width:660px;opacity:0;transform:translateY(18px);transition:opacity .7s ease .5s,transform .7s ease .5s;}
.result-area.visible{opacity:1;transform:translateY(0);}
.result-panel{background:rgba(253,249,245,.9);border:1px solid rgba(200,149,106,.2);border-radius:20px;padding:30px 28px;backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(60,40,20,.07);display:flex;flex-direction:column;gap:20px;}

.result-header{display:flex;flex-direction:column;align-items:center;gap:5px;padding-bottom:18px;border-bottom:1px solid rgba(200,149,106,.14);}
.r-fairy-name{font-family:'Cormorant Garamond',serif;font-size:1.65rem;font-weight:500;font-style:italic;color:var(--dark);letter-spacing:.06em;}
.r-roman{font-family:'Cormorant Garamond',serif;font-size:.72rem;font-style:italic;color:var(--muted);letter-spacing:.18em;}
.r-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 15px;background:rgba(200,149,106,.09);border:1px solid rgba(200,149,106,.2);border-radius:100px;font-size:.65rem;color:var(--rg);letter-spacing:.14em;margin-top:4px;}

.r-section{display:flex;flex-direction:column;gap:9px;}
.r-label{font-size:.62rem;letter-spacing:.44em;color:var(--rg);font-weight:400;}
.r-content{font-size:.86rem;color:var(--dark);line-height:1.78;letter-spacing:.05em;}
.style-name{font-family:'Cormorant Garamond',serif;font-size:1.22rem;font-style:italic;font-weight:500;color:var(--dark);letter-spacing:.04em;display:block;margin-bottom:3px;}

.swatches{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;}
.swatch{display:flex;flex-direction:column;align-items:center;gap:5px;}
.swatch-dot{width:38px;height:38px;border-radius:50%;border:1.5px solid rgba(200,149,106,.22);box-shadow:0 3px 10px rgba(60,40,20,.1);position:relative;overflow:hidden;}
.swatch-dot::after{content:'';position:absolute;top:4px;left:6px;width:10px;height:7px;background:rgba(255,255,255,.42);border-radius:50%;transform:rotate(-30deg);}
.swatch-label{font-size:.56rem;color:var(--med);letter-spacing:.07em;text-align:center;max-width:50px;line-height:1.3;}

.accent-box{padding:10px 14px;background:rgba(200,149,106,.06);border-left:2px solid var(--rg-light);border-radius:0 6px 6px 0;font-size:.8rem;color:var(--med);line-height:1.68;font-style:italic;}
.vibe-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;color:var(--dark);line-height:1.72;letter-spacing:.04em;text-align:center;padding:0 8px;}
.ritual-box{background:linear-gradient(135deg,rgba(240,200,178,.1),rgba(200,180,220,.07));border:1px solid rgba(200,149,106,.16);border-radius:12px;padding:15px 18px;font-size:.8rem;color:var(--med);line-height:1.78;letter-spacing:.05em;text-align:center;font-style:italic;}

.r-divider{height:1px;background:linear-gradient(to right,transparent,rgba(200,149,106,.16),transparent);}

.cta-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding-top:4px;}
.reset-btn{padding:11px 30px;background:transparent;border:1px solid var(--rg);color:var(--dark);font-family:'Noto Serif TC',serif;font-size:.8rem;letter-spacing:.28em;cursor:pointer;border-radius:2px;transition:all .3s ease;touch-action:manipulation;}
.reset-btn:hover{background:rgba(200,149,106,.11);box-shadow:0 3px 14px var(--rg-glow);transform:translateY(-1px);}
.ghost-btn{padding:11px 26px;background:transparent;border:1px solid rgba(200,149,106,.28);color:var(--muted);font-family:'Noto Serif TC',serif;font-size:.76rem;letter-spacing:.2em;cursor:pointer;border-radius:2px;transition:all .3s ease;touch-action:manipulation;}
.ghost-btn:hover{border-color:var(--rg);color:var(--dark);background:rgba(200,149,106,.05);}

.footer-note{font-size:.58rem;color:rgba(160,144,136,.44);letter-spacing:.2em;text-align:center;}
.hidden{display:none!important;}

/* NAIL GALLERY */
.nail-gallery{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.nail-gallery::-webkit-scrollbar{height:3px;}
.nail-gallery::-webkit-scrollbar-track{background:transparent;}
.nail-gallery::-webkit-scrollbar-thumb{background:rgba(200,149,106,.3);border-radius:2px;}
.nail-thumb-wrap{flex-shrink:0;border-radius:11px;overflow:hidden;background:var(--ivory);scroll-snap-align:start;position:relative;}
.nail-thumb{width:160px;height:120px;object-fit:cover;object-position:center;display:block;opacity:0;transition:opacity .6s ease,transform .2s ease;cursor:zoom-in;}
.nail-thumb.loaded{opacity:1;}
.nail-thumb:hover{transform:scale(1.04);}
.nail-img-credit{margin-top:5px;font-size:.54rem;color:var(--muted);letter-spacing:.1em;text-align:right;}
.nail-img-credit a{color:var(--muted);text-decoration:none;}
.nail-img-credit a:hover{color:var(--rg);}

/* CLOSING MESSAGE */
.closing-wrap{text-align:center;padding:18px 10px 6px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.closing-ornament{display:flex;align-items:center;gap:12px;width:100%;max-width:280px;color:var(--rg-light);font-size:.65rem;}
.closing-ornament::before,.closing-ornament::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--rg-light),transparent);}
.closing-text{font-family:'Cormorant Garamond',serif;font-size:1.08rem;font-style:italic;color:var(--dark);line-height:1.85;letter-spacing:.05em;max-width:480px;}
.closing-sign{font-size:.62rem;color:var(--muted);letter-spacing:.35em;margin-top:2px;}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(28,14,6,.92);z-index:9999;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s ease;pointer-events:none;cursor:zoom-out;backdrop-filter:blur(6px);}
.lightbox.open{opacity:1;pointer-events:all;}
.lightbox-img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:10px;box-shadow:0 24px 90px rgba(0,0,0,.65);transform:scale(.9);transition:transform .4s cubic-bezier(.34,1.56,.64,1);}
.lightbox.open .lightbox-img{transform:scale(1);}
.lightbox-close{position:absolute;top:18px;right:22px;background:rgba(255,240,225,.12);border:1px solid rgba(255,240,225,.2);color:rgba(255,240,225,.8);font-size:1rem;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;touch-action:manipulation;}
.lightbox-close:hover{background:rgba(255,240,225,.22);color:#fff;}
.nail-img{cursor:zoom-in;}

@media(max-width:580px){
  .page{padding:34px 14px 60px;gap:24px;}
  .result-panel{padding:20px 16px;}
  .header h1{font-size:clamp(2rem,8vw,2.8rem);}
  .swatches{gap:10px;}
  .swatch-dot{width:32px;height:32px;}
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<canvas id="petalCanvas"></canvas>

<main class="page">

  <header class="header">
    <span class="header-script">✦ Fairy Oracle ✦</span>
    <h1>仙女下凡<span class="dot"> · </span>美甲神諭</h1>
    <p class="header-sub">FAIRY DESCENDS &nbsp;·&nbsp; NAIL REVELATION</p>
    <div class="ornament">🌸</div>
  </header>

  <p class="instr" id="instrText">
    靜下心，閉上眼睛<br>
    <em>讓仙女感受你此刻的能量</em><br>
    準備好後，輕輕點牌召喚她
  </p>

  <div class="card-stage">
    <div class="card-wrap" id="cardWrap" onclick="drawCard()" role="button" aria-label="抽牌">
      <div class="card-inner" id="cardInner">

        <!-- BACK -->
        <div class="card-face card-back" id="cardBack">
          <div class="back-inner">
            <span class="back-corner tl">✦</span>
            <span class="back-corner br">✦</span>
            <div class="back-petals">🌸 🌺 🌸</div>
            <div class="back-emoji">🧚‍♀️</div>
            <div class="back-label">Fairy Oracle</div>
            <div style="font-size:.6rem;color:rgba(200,149,106,.25);letter-spacing:.18em;">✦ ✦ ✦</div>
          </div>
        </div>

        <!-- FRONT (populated by JS) -->
        <div class="card-face card-front" id="cardFront">
          <div class="front-frame">
            <span class="card-roman" id="cRoman"></span>
            <div class="card-art">
              <div class="card-emoji-main" id="cEmojiMain"></div>
              <div class="card-emoji-sub" id="cEmojiSub"></div>
            </div>
            <div class="card-divider"></div>
            <div class="card-name-text" id="cName"></div>
            <div class="card-energy-text" id="cEnergy"></div>
          </div>
          <div class="shimmer-wrap" id="shimmer"></div>
        </div>

      </div>
    </div>

    <button class="draw-btn" id="drawBtn">✦ 召喚仙女 ✦</button>
  </div>

  <!-- RESULT -->
  <section class="result-area hidden" id="resultArea">
    <div class="result-panel">

      <div class="result-header">
        <div class="r-fairy-name" id="rName"></div>
        <div class="r-roman" id="rRoman"></div>
        <div class="r-badge">✦ <span id="rEnergy"></span> ✦</div>
      </div>

      <div class="nail-gallery" id="nailGallery"></div>
      <p class="nail-img-credit">圖片來源：<a href="https://www.pexels.com" target="_blank" rel="noopener">Pexels</a>（免費商用授權）</p>

      <div class="r-section">
        <div class="r-label">美甲風格</div>
        <div class="r-content">
          <span class="style-name" id="rStyle"></span>
          <span id="rTechnique"></span>
        </div>
      </div>

      <div class="r-divider"></div>

      <div class="r-section">
        <div class="r-label">今日靈感色系</div>
        <div class="swatches" id="rSwatches"></div>
      </div>

      <div class="r-divider"></div>

      <div class="r-section">
        <div class="r-label">指甲裝飾建議</div>
        <div class="accent-box" id="rAccent"></div>
      </div>

      <div class="vibe-text" id="rVibe"></div>

      <div class="r-divider"></div>

      <div class="r-section">
        <div class="r-label">仙女儀式</div>
        <div class="ritual-box" id="rRitual"></div>
      </div>

      <div class="closing-wrap">
        <div class="closing-ornament">🌸</div>
        <div class="closing-text" id="rClosing"></div>
        <div class="closing-sign">— 仙女的祝福 —</div>
      </div>

      <div class="cta-row">
        <button class="reset-btn" onclick="resetCard()">✦ 重新召喚 ✦</button>
        <button class="ghost-btn" onclick="shareResult()">分享美甲靈感</button>
      </div>

    </div>
  </section>

  <p class="footer-note">✦ 美甲由仙女啟示，靈感由你創造 &nbsp;·&nbsp; Fairy Nail Oracle ✦</p>

</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()" aria-label="關閉">✕</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
</div>

<script>
const deck = [
  {
    name:'月光仙子',roman:'Luna Fae',
    em:'🌙',sub:'✨🧚‍♀️',
    bg:'linear-gradient(155deg,#EEF3F8 0%,#E4EAF5 60%,#DDE4F0 100%)',
    energy:'靜謐 · 直覺 · 神秘感',
    nail:{
      style:'貝殼珠光暈染',
      tech:'以透明基底暈染出月光質感，指尖輕透如真實月光倒映',
      colors:[{name:'月光白',hex:'#F4F0EC'},{name:'銀河銀',hex:'#C4CBD6'},{name:'霜藍粉',hex:'#CDD8EE'}],
      accent:'拇指或無名指點綴月牙形貼鑽，或細筆勾畫纖細星點',
      vibe:'你是夜晚最安靜的光，不張揚卻讓人無法忽視',
      ritual:'塗好指甲後，對著夜空或月光靜坐片刻，讓仙女的靜謐能量透過指尖流入心中'
    }
  },
  {
    name:'玫瑰女神',roman:'Rose Goddess',
    em:'🌹',sub:'👑🌸',
    bg:'linear-gradient(155deg,#F9EEF1 0%,#F4E4E8 60%,#EED8DE 100%)',
    energy:'魅力 · 愛意 · 豐盛',
    nail:{
      style:'復古玫瑰金箔',

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }

function mkPetal() {
  return {
    x: Math.random() * W, y: -20,

    speed: Math.random() * 1.2 + 0.4,
    drift: (Math.random() - 0.5) * 0.8,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    alpha: Math.random() * 0.35 + 0.1,
    color: petalColors[Math.floor(Math.random() * petalColors.length)],
    type: Math.random() < 0.25 ? 'star' : 'petal'
  };
}

function drawOnePetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.alpha;
  if (p.type === 'star') {
    ctx.fillStyle = '#D8A880';
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i * Math.PI) / 4;
      const r = i % 2 === 0 ? p.size : p.size * 0.35;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size * 0.38, p.size, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function animatePetals() {
  ctx.clearRect(0, 0, W, H);
  if (Math.random() < 0.055 && petals.length < 38) petals.push(mkPetal());
  petals = petals.filter(p => p.y < H + 30);
  for (const p of petals) {
    p.y += p.speed; p.x += p.drift; p.rot += p.rotSpeed;
    drawOnePetal(p);
  }
  requestAnimationFrame(animatePetals);
}
animatePetals();

function showResult(c) {
  // Nail photo gallery
  const gallery = document.getElementById('nailGallery');
  gallery.innerHTML = '';
  const ids = cardImgs[c.name] || [];
  ids.forEach((id, i) => {
    const thumbUrl = `https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=340&h=220&fit=crop`;
    const hqUrl   = `https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=1400&h=900&fit=crop`;
    const wrap = document.createElement('div');
    wrap.className = 'nail-thumb-wrap';
    const img = document.createElement('img');
    img.className = 'nail-thumb';
    img.alt = `${c.name} 美甲靈感 ${i + 1}`;
    img.loading = 'lazy';
    img.onload = () => img.classList.add('loaded');
    img.onerror = () => { wrap.style.display = 'none'; };
    img.onclick = () => openLightbox(hqUrl, img.alt);
    img.src = thumbUrl;
    if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
    wrap.appendChild(img);
    gallery.appendChild(wrap);
  });

  document.getElementById('rName').textContent = c.name;
  document.getElementById('rRoman').textContent = c.roman;
  document.getElementById('rEnergy').textContent = c.energy;
  document.getElementById('rStyle').textContent = c.nail.style;
  document.getElementById('rTechnique').textContent = c.nail.tech;
  document.getElementById('rAccent').textContent = c.nail.accent;
  document.getElementById('rVibe').textContent = '✦ ' + c.nail.vibe + ' ✦';
  document.getElementById('rRitual').textContent = c.nail.ritual;

  const sw = document.getElementById('rSwatches');
  sw.innerHTML = '';
  c.nail.colors.forEach(col => {
    const div = document.createElement('div');
    div.className = 'swatch';
    div.innerHTML = `<div class="swatch-dot" style="background:${col.hex}"></div><span class="swatch-label">${col.name}</span>`;
    sw.appendChild(div);
  });

  // Closing message
  document.getElementById('rClosing').textContent = cardClosings[c.name] || '';

  const ra = document.getElementById('resultArea');

  requestAnimationFrame(() => requestAnimationFrame(() => ra.classList.add('visible')));

function openLightbox(src, alt) {
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightboxImg');
  lbImg.src = src;
  lbImg.alt = alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
